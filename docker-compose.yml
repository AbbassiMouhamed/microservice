services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: smartlingua
      MYSQL_USER: smartlingua
      MYSQL_PASSWORD: smartlingua
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - mysql-data-8-0:/var/lib/mysql

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.2
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

  discovery-server:
    build:
      context: .
      dockerfile: backend/discovery-server/Dockerfile
    ports:
      - "8761:8761"

  config-server:
    build:
      context: .
      dockerfile: backend/config-server/Dockerfile
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
    ports:
      - "8888:8888"
    depends_on:
      - discovery-server

  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: http://localhost
      # Tokens are issued with issuer=http://localhost:8180/... because the browser logs in via the host port.
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/smartlingua
      # But containers must fetch JWKS from the internal Keycloak service name.
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/smartlingua/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
      - config-server
      - keycloak

  exam-cert-service:
    build:
      context: .
      dockerfile: backend/exam-cert-service/Dockerfile
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://mysql:3306/smartlingua?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: smartlingua
      DB_PASSWORD: smartlingua
      SIGNING_KEYS_DIR: /data/keys
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/smartlingua
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/smartlingua/protocol/openid-connect/certs
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      keycloak:
        condition: service_started
    volumes:
      - signing-keys:/data/keys

  frontend:
    build:
      context: .
      dockerfile: frontend/smartlingua-ui/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-gateway

  forum-service:
    build:
      context: .
      dockerfile: backend/forum-service/Dockerfile
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      SERVER_PORT: 8082
      DB_URL: jdbc:mysql://mysql:3306/smartlingua?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: smartlingua
      DB_PASSWORD: smartlingua
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/smartlingua
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/smartlingua/protocol/openid-connect/certs
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      keycloak:
        condition: service_started

  course-resource-service:
    build:
      context: .
      dockerfile: backend/course-resource-service/Dockerfile
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      SERVER_PORT: 8083
      DB_URL: jdbc:mysql://mysql:3306/smartlingua?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: smartlingua
      DB_PASSWORD: smartlingua
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/smartlingua
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/smartlingua/protocol/openid-connect/certs
    ports:
