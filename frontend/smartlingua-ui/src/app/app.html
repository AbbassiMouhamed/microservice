<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="nav-title">SmartLingua</div>
    <mat-nav-list>
      <a mat-list-item routerLink="/exams" routerLinkActive="active">Exams</a>

      <a
        *ngIf="auth.isTeacherOrAdmin"
        mat-list-item
        routerLink="/courses"
        routerLinkActive="active"
      >
        Courses
      </a>

      <a *ngIf="auth.isAdmin" mat-list-item routerLink="/students" routerLinkActive="active">
        Users
      </a>

      <a mat-list-item routerLink="/certificates" routerLinkActive="active">Certificates</a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <span>Exam &amp; Certification Management</span>
      <span class="spacer"></span>

      <span *ngIf="auth.isAuthenticated" style="margin-right: 8px">
        {{ auth.username }}
      </span>
      <button *ngIf="auth.isAuthenticated" mat-button (click)="auth.logout()">Logout</button>

      <a mat-button href="/api/swagger-ui" target="_blank" rel="noopener">API Docs</a>
    </mat-toolbar>

    <div class="content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
