server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: exam-cert-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
  cloud:
    config:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/smartlingua}
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/smartlingua?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:smartlingua}
    password: ${DB_PASSWORD:smartlingua}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        type:
          preferred_uuid_jdbc_type: CHAR
    open-in-view: false
  flyway:
    enabled: true

app:
  signing:
    keysDir: ${SIGNING_KEYS_DIR:/data/keys}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
