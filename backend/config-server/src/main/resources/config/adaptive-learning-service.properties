# Adaptive Learning Service
welcome.message=Welcome to Adaptive-Learning Service

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.table=flyway_schema_history_adaptive
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.chat.options.model=gpt-4o-mini

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}

adaptive.ai.enabled=${ADAPTIVE_AI_ENABLED:false}
adaptive.security.relaxed-student-check=true
adaptive.scheduler.difficulty.enabled=true
adaptive.scheduler.difficulty.cron=0 */10 * * * *
adaptive.scheduler.recommendation.enabled=true
adaptive.scheduler.recommendation.cron=0 15 * * * *
adaptive.scheduler.simple-progress.enabled=true
adaptive.scheduler.simple-progress.cron=0 25 * * * *
