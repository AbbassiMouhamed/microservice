# Shared configuration for all microservices
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/smartlingua?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:smartlingua}
spring.datasource.password=${DB_PASSWORD:smartlingua}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/smartlingua}

eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://discovery-server:8761/eureka}

management.endpoints.web.exposure.include=health,info,refresh
