server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/smartlingua}
  cloud:
    gateway:
      routes:
        - id: forum-service
          uri: lb://forum-service
          predicates:
            - Path=/api/forum/**
        - id: course-resource-service
          uri: lb://course-resource-service
          predicates:
            - Path=/api/courses/**,/api/metier/**
        - id: quiz-service
          uri: lb://quiz-service
          predicates:
            - Path=/api/quiz/**
        - id: messaging-service
          uri: lb://messaging-service
          predicates:
            - Path=/api/messaging/**,/ws-messaging/**
        - id: adaptive-learning-service
          uri: lb://adaptive-learning-service
          predicates:
            - Path=/api/adaptive/**
        - id: exam-cert-service
          uri: lb://exam-cert-service
          predicates:
            - Path=/api/**
      default-filters:
        - RemoveRequestHeader=Cookie
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# Local-dev CORS so Angular can call the gateway directly if needed
spring.cloud.gateway.globalcors:
  cors-configurations:
    "[/**]":
      allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}"
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowedHeaders: "*"
      allowCredentials: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info
