server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/smartlingua}
  cloud:
    gateway:
      routes:
        - id: forum-service
          uri: lb://forum-service
          predicates:
            - Path=/api/forum/**
        - id: course-resource-service
          uri: lb://course-resource-service
          predicates:
            - Path=/api/courses/**,/api/metier/**
        - id: quiz-service
          uri: lb://quiz-service
          predicates:
            - Path=/api/quiz/**
        - id: messaging-service
          uri: lb://messaging-service
          predicates:
            - Path=/api/messaging/**,/ws-messaging/**
        - id: adaptive-learning-service
          uri: lb://adaptive-learning-service
          predicates:
            - Path=/api/adaptive/**
        - id: exam-cert-service
          uri: lb://exam-cert-service
          predicates:
            - Path=/api/**

        # ── Swagger doc routes ──
        - id: exam-cert-service-docs
          uri: lb://exam-cert-service
          predicates:
            - Path=/exam-cert-service/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: forum-service-docs
          uri: lb://forum-service
          predicates:
            - Path=/forum-service/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: course-resource-service-docs
          uri: lb://course-resource-service
          predicates:
            - Path=/course-resource-service/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: quiz-service-docs
          uri: lb://quiz-service
          predicates:
            - Path=/quiz-service/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: messaging-service-docs
          uri: lb://messaging-service
          predicates:
            - Path=/messaging-service/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: adaptive-learning-service-docs
          uri: lb://adaptive-learning-service
          predicates:
            - Path=/adaptive-learning-service/v3/api-docs/**
          filters:
            - StripPrefix=1
      default-filters:
        - RemoveRequestHeader=Cookie
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# Local-dev CORS so Angular can call the gateway directly if needed
spring.cloud.gateway.globalcors:
  cors-configurations:
    "[/**]":
      allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}"
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowedHeaders: "*"
      allowCredentials: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka}

springdoc:
  swagger-ui:
    urls:
      - name: Exam & Certification
        url: /exam-cert-service/v3/api-docs
      - name: Forum
        url: /forum-service/v3/api-docs
      - name: Courses & Resources
        url: /course-resource-service/v3/api-docs
      - name: Quiz
        url: /quiz-service/v3/api-docs
      - name: Messaging
        url: /messaging-service/v3/api-docs
      - name: Adaptive Learning
        url: /adaptive-learning-service/v3/api-docs
    use-root-path: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
